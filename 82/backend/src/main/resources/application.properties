# Application Configuration
spring.application.name=careapp

# Server Port Configuration
server.port=8081

# MongoDB Configuration
# Priority: 1) System property (-Dspring.data.mongodb.uri=...),
# 2) Environment variable (SPRING_DATA_MONGODB_URI),
# 3) Environment variable (MONGODB_URI),
# 4) Local default for development.
spring.data.mongodb.uri=${spring.data.mongodb.uri:${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb://localhost:27017/eighty-two}}}

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB

# Static Resources (for accessing uploaded files)
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# API Key of SendGrid
# Use environment variable if available, otherwise use empty string (emails will fail but app can start)
# Priority: 1) System property (-Dsendgrid.api-key=...),
# 2) Environment variable (SENDGRID_API_KEY),
# 3) Empty string
sendgrid.api-key=${sendgrid.api-key:${SENDGRID_API_KEY:}}
# If you have a SendGrid API key, set it as environment variable:
# export SENDGRID_API_KEY=SG.your_actual_api_key_here
# Or pass as system property:
# -Dsendgrid.api-key=SG.your_actual_api_key_here
